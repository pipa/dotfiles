format = '$directory$git_branch $cmd_duration$line_break$character'

add_newline = false

[character]
success_symbol = "➜"
error_symbol = "✗"
vimcmd_symbol = "❮"

[cmd_duration]
min_time = 500
style = "bold dimmed white"
format = "took $duration "

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"
read_only = "🔒"
read_only_style = "red"
home_symbol = "~"

[git_branch]
symbol = ""
style = "bold green"
format = "on [$symbol$branch]($style) "

[git_status]
format = '([$all_status$ahead_behind])'
style = "bold green"
conflicted = "⚔️ "
ahead = "⇡${count}"
behind = "⇣${count}"
untracked = "?${count}"
stashed = "📦"
modified = "!${count}"
staged = "+${count}"

[nodejs]
symbol = "⬢ "
style = "bold green"

[python]
symbol = "🐍 "
style = "yellow bold"

[rust]
symbol = "🦀 "
style = "bold red"

[docker_context]
symbol = "🐳 "
style = "blue bold"

[status]
disabled = false
success_symbol = ""
error_symbol = "✗"

[time]
disabled = true
